<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&T - Movie and TV-Shows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-card: #252525;
            --text-primary: #ffffff;
            --text-secondary: #b8b8b8;
            --accent-1: #e3ae5c;
            --accent-2: #f2bb76;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-primary: linear-gradient(135deg, #ffd79a 0%, #fffcdf 100%);
            --bg-secondary: #ffe4ba;
            --bg-card: #fffcdf;
            --text-primary: #2d2d2d;
            --text-secondary: #666666;
            --shadow: rgba(227, 174, 92, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        .arrow-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .arrow-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(227, 174, 92, 0.3);
            transition: all 0.3s ease;
        }

        .arrow-dot.arrow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 10px solid rgba(227, 174, 92, 0.8);
            transform: translate(-50%, -50%);
        }

        .navbar {
            background: linear-gradient(90deg, #e3ae5c 0%, #f2bb76 100%);
            padding: 1.2rem 2rem;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
        }

        .nav-content {
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--accent-1);
            margin-bottom: 2rem;
        }

        .content-wrapper {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .filter-sidebar {
            min-width: 200px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
        }

        .filter-title {
            font-size: 1.2rem;
            color: var(--accent-1);
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-label {
            display: block;
            color: var(--accent-2);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .filter-select {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--accent-2);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
        }

        .main-content {
            flex: 1;
        }

        .search-container {
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border: 3px solid var(--accent-2);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-1);
        }

        .loading {
            text-align: center;
            font-size: 1.3rem;
            color: var(--accent-1);
            margin: 2rem 0;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        .movie-card {
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            height: 450px;
            perspective: 1000px;
        }

        .movie-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .movie-card:hover .movie-card-inner {
            transform: rotateY(180deg);
        }

        .movie-card-front,
        .movie-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 24px var(--shadow);
            background: var(--bg-card);
            overflow: auto;
        }

        .movie-card-back {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .movie-poster-container {
            width: 100%;
            height: 100%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--text-secondary);
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .click-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .movie-card:hover .click-hint {
            opacity: 1;
        }

        .back-title {
            font-size: 1.3rem;
            color: var(--accent-1);
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .rating-year {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .rating {
            background: var(--accent-2);
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .year {
            color: var(--accent-1);
            font-weight: 600;
        }

        .back-description {
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        .back-details {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            border-top: 1px solid var(--bg-secondary);
            padding-top: 0.8rem;
        }

        .detail-row {
            font-size: 0.8rem;
        }

        .detail-label {
            font-weight: bold;
            color: var(--accent-2);
        }

        .detail-value {
            color: var(--text-secondary);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column;
            }

            .movie-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                        <select class="filter-select" id="movieSort">

                            <option value="year">Year (Newest)</option>
                            <option value="title">Title (A-Z)</option>
                        </select>
                    </div>
                </aside>
                <div class="main-content">

                        <input type="text" class="search-input" id="movieSearch" placeholder="Search movies...">

                    <div class="movie-grid" id="movieGrid"></div>
                </div>

                            <option value="year">Year (Newest)</option>
                            <option value="title">Title (A-Z)</option>
                        </select>
                    </div>
                </aside>
                <div class="main-content">
                    <div class="search-container">
                        <input type="text" class="search-input" id="tvSearch" placeholder="Search TV shows...">
                    </div>
                    <div class="loading" id="tvLoading" style="display:none;">Loading...</div>
                    <div class="movie-grid" id="tvGrid"></div>
                </div>
            </div>
        </div>

        <!-- TOP 250 -->
        <div id="top250Section" class="hidden">
            <h1 class="page-title">The Tops</h1>

                    <div class="search-container">

                    </div>
                    <div class="loading" id="topLoading" style="display:none;">Loading...</div>
                    <div class="movie-grid" id="topGrid"></div>
                </div>
            </div>
        </div>
    </div>

        ];

        let data = {
            movies: sampleMovies.filter(m => m.type === 'movie'),
            tv: sampleMovies.filter(m => m.type === 'tv'),
            all: [...sampleMovies]
        };

        // ARROW BACKGROUND
        function initArrows() {
            const container = document.getElementById('arrowBg');
            const dots = [];
            for (let i = 0; i < 80; i++) {
                const dot = document.createElement('div');
                dot.className = 'arrow-dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                container.appendChild(dot);
                dots.push(dot);
            }
            document.addEventListener('mousemove', e => {
                dots.forEach(dot => {
                    const rect = dot.getBoundingClientRect();
                    const dx = e.clientX - (rect.left + 6);
                    const dy = e.clientY - (rect.top + 6);
                    const dist = Math.hypot(dx, dy);
                    const intensity = Math.max(0, 1 - dist / 150);
                    if (intensity > 0.1) {
                        dot.classList.add('arrow');
                        dot.style.transform = `rotate(${Math.atan2(dy, dx) * 180 / Math.PI}deg)`;
                        dot.style.opacity = 0.3 + intensity * 0.5;
                    } else {
                        dot.classList.remove('arrow');
                        dot.style.opacity = 0.3;
                    }
                });
            });
        }

        // THEME
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        themeToggle.addEventListener('click', () => {
            const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        });

        // CREATE CARD
        function createCard(movie) {
            const div = document.createElement('div');
            div.className = 'movie-card';
            div.innerHTML = `
                <div class="movie-card-inner">
                    <div class="movie-card-front">
                        <div class="movie-poster-container">
                            ${movie.poster ? `<img src="${movie.poster}" class="movie-poster">` : '🎬'}
                            <div class="click-hint">Hover for details</div>
                        </div>
                    </div>
                    <div class="movie-card-back">
                        <h2 class="back-title">${movie.title}</h2>
                        <div class="rating-year">
                            <span class="rating">⭐ ${movie.rating}</span>
                            <span class="year">${movie.year}</span>
                        </div>
                        <p class="back-description">${movie.description}</p>
                        <div class="back-details">
                            <div class="detail-row"><span class="detail-label">Director:</span> <span class="detail-value">${movie.director}</span></div>
                            <div class="detail-row"><span class="detail-label">Stars:</span> <span class="detail-value">${movie.stars.join(', ')}</span></div>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        // DISPLAY
        function display(movies, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            movies.forEach(m => grid.appendChild(createCard(m)));
        }

        // SORT
        function sort(movies, by) {
            const sorted = [...movies];
            if (by === 'rating') sorted.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
            else if (by === 'year') sorted.sort((a, b) => parseInt(b.year) - parseInt(a.year));
            else if (by === 'title') sorted.sort((a, b) => a.title.localeCompare(b.title));
            return sorted;
        }

        // SEARCH API
        async function searchAPI(query) {
            try {
                const res = await fetch(`https://imdb.iamidiotareyoutoo.com/search?q=${encodeURIComponent(query)}`);
                const json = await res.json();
                if (json.description && json.description.length > 0) {
                    return json.description.slice(0, 24).map(item => ({
                        title: item['#TITLE'] || 'N/A',
                        year: item['#YEAR'] || 'N/A',
                        rating: item['#RATING'] || 'N/A',
                        description: item['#ACTORS'] || 'No description',
                        poster: item['#IMG_POSTER'] || '',
                        director: 'N/A',
                        writers: [],
                        stars: item['#ACTORS'] ? [item['#ACTORS']] : [],
                        type: 'movie'
                    }));
                }
            } catch (e) { console.error(e); }
            return null;
        }

        // NAVIGATION
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const section = link.dataset.section;
                document.querySelectorAll('[id$="Section"]').forEach(el => el.classList.add('hidden'));
                document.getElementById(section + 'Section').classList.remove('hidden');
                document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                if (section === 'movies') display(sort(data.movies, 'rating'), 'movieGrid');
                else if (section === 'tv') display(sort(data.tv, 'rating'), 'tvGrid');
                else if (section === 'top250') display(sort(data.all, 'rating'), 'topGrid');
                else if (section === 'home') display(sampleMovies, 'homeGrid');
            });
        });

        // HOME SEARCH
        let homeTimeout;
        document.getElementById('homeSearch').addEventListener('input', e => {
            clearTimeout(homeTimeout);
            const q = e.target.value.trim();
            if (!q) {
                display(sampleMovies, 'homeGrid');
                return;
            }
            homeTimeout = setTimeout(async () => {
                document.getElementById('homeLoading').style.display = 'block';
                const results = await searchAPI(q);
                document.getElementById('homeLoading').style.display = 'none';
                if (results) display(results, 'homeGrid');
                else display(sampleMovies, 'homeGrid');
            }, 500);
        });

        // MOVIES SEARCH
        let movieTimeout;
        document.getElementById('movieSearch').addEventListener('input', e => {
            clearTimeout(movieTimeout);
            const q = e.target.value.trim();
            if (!q) {
                display(sort(data.movies, document.getElementById('movieSort').value), 'movieGrid');
                return;
            }
            movieTimeout = setTimeout(async () => {
                document.getElementById('movieLoading').style.display = 'block';
                const results = await searchAPI(q);
                document.getElementById('movieLoading').style.display = 'none';
                if (results) data.movies = results;
                display(sort(data.movies, document.getElementById('movieSort').value), 'movieGrid');
            }, 500);
        });

        document.getElementById('movieSort').addEventListener('change', () => {
            display(sort(data.movies, this.value), 'movieGrid');
        });

        // TV SEARCH
        let tvTimeout;
        document.getElementById('tvSearch').addEventListener('input', e => {
            clearTimeout(tvTimeout);
            const q = e.target.value.trim();
            if (!q) {
                display(sort(data.tv, document.getElementById('tvSort').value), 'tvGrid');
                return;
            }
            tvTimeout = setTimeout(async () => {
                document.getElementById('tvLoading').style.display = 'block';
                const results = await searchAPI(q);
                document.getElementById('tvLoading').style.display = 'none';
                if (results) data.tv = results;
                display(sort(data.tv, document.getElementById('tvSort').value), 'tvGrid');
            }, 500);
        });

        document.getElementById('tvSort').addEventListener('change', () => {
            display(sort(data.tv, this.value), 'tvGrid');
        });

        // TOP 250 SEARCH
        let topTimeout;
        document.getElementById('topSearch').addEventListener('input', e => {
            clearTimeout(topTimeout);
            const q = e.target.value.trim();
            if (!q) {
                display(sort(data.all, document.getElementById('topSort').value), 'topGrid');
                return;
            }
            topTimeout = setTimeout(async () => {
                document.getElementById('topLoading').style.display = 'block';
                const results = await searchAPI(q);
                document.getElementById('topLoading').style.display = 'none';
                if (results) data.all = results;
                display(sort(data.all, document.getElementById('topSort').value), 'topGrid');
            }, 500);
        });

        document.getElementById('topSort').addEventListener('change', () => {
            display(sort(data.all, this.value), 'topGrid');
        });

        // INIT
        initArrows();
        display(sampleMovies, 'homeGrid');
        display(sort(data.movies, 'rating'), 'movieGrid');
        display(sort(data.tv, 'rating'), 'tvGrid');
        display(sort(data.all, 'rating'), 'topGrid');
    </script>
